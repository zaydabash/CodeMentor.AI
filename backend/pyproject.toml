[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
# Helper scripts insert the project root onto sys.path before importing app.*,
# which is a deliberate import-ordering exception.
"scripts/*" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"

[tool.bandit]
exclude_dirs = ["tests", "venv", "env"]
# B101 assert_used; B404/B603/B607 are inherent to invoking the bundled
# linters (ruff/bandit/eslint) by name without a shell, which is the safe
# pattern; B110/B112 cover deliberate best-effort error handling around
# optional external tools.
skips = ["B101", "B404", "B603", "B607", "B110", "B112"]

